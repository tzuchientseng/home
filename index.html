<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Sunny</title>
    <link rel="icon" href="images/favicon.ico">
    <style>
      body,
      html {
        height: 100%;
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Arial, sans-serif;
        background: #343a40
      }

      .fullscreen-div {
        text-align: center;
        background-color: #fff;
        padding: 20px;
        border-radius: 20px;
        box-shadow: 0 10px 20px rgba(0, 0, 0, .15);
        opacity: 0;
        transform: translateY(-50px) rotate(-10deg) scale(.8);
        animation: popupComplex 1s cubic-bezier(.42, 0, .58, 1) forwards;
        width: 400px
      }

      @keyframes popupComplex {
        0% {
          opacity: 0;
          transform: translateY(-50px) rotate(-10deg) scale(.8)
        }

        50% {
          opacity: .6;
          transform: translateY(20px) rotate(5deg) scale(1.1)
        }

        100% {
          opacity: 1;
          transform: translateY(0) rotate(0) scale(1)
        }
      }

      h1 {
        font-size: 2.5em;
        color: #67a2dd;
        margin-bottom: 20px;
        letter-spacing: 2px;
        animation: fadeInText 2s ease forwards
      }

      @keyframes fadeInText {
        0% {
          opacity: 0;
          transform: translateY(-20px)
        }

        100% {
          opacity: 1;
          transform: translateY(0)
        }
      }

      img {
        width: 40%;
        display: block;
        margin: 0 auto;
        animation: fadeInImage 2s ease forwards
      }

      @keyframes fadeInImage {
        0% {
          opacity: 0;
          transform: translateY(-20px)
        }

        100% {
          opacity: 1;
          transform: translateY(0)
        }
      }

      .button {
        display: inline-block;
        width: 180px;
        padding: 12px 0;
        font-size: 18px;
        font-weight: 700;
        color: #fff;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        text-decoration: none;
        transition: all .3s ease;
        margin: 10px 0;
        opacity: 0;
        transform: translateY(20px);
        animation: fadeInButton 2s ease .8s forwards
      }

      #blogButton {
        background: linear-gradient(135deg, #ff9800, #e65100);
        box-shadow: 0 5px 15px rgba(255, 152, 0, .4)
      }

      #blogButton:hover {
        background: linear-gradient(135deg, #e65100, #bf360c);
        box-shadow: 0 8px 20px rgba(255, 87, 34, .6);
        transform: translateY(-3px) scale(1.05);
        transition: all .3s ease
      }

      #apiButton {
        background: linear-gradient(135deg, #42a5f5, #1565c0);
        box-shadow: 0 5px 15px rgba(66, 165, 245, .4)
      }

      #apiButton:hover {
        background: linear-gradient(135deg, #1565c0, #0d47a1);
        box-shadow: 0 8px 20px rgba(33, 150, 243, .6);
        transform: translateY(-3px) scale(1.05);
        transition: all .3s ease
      }

      @keyframes fadeInButton {
        0% {
          opacity: 0;
          transform: translateY(20px)
        }

        100% {
          opacity: 1;
          transform: translateY(0)
        }
      }

      @media (min-width:1024px) {
        .fullscreen-div {
          width: 600px;
          padding: 30px
        }

        img {
          width: 50%
        }

        .button {
          width: 200px;
          font-size: 20px
        }
      }

      @media (max-width:1024px) {
        .fullscreen-div {
          width: 400px
        }

        img {
          width: 40%
        }

        .button {
          width: 180px;
          font-size: 18px
        }
      }

      @media (max-width:600px) {
        .fullscreen-div {
          width: 300px
        }

        h1 {
          font-size: 1.8em
        }

        img {
          width: 60%
        }

        .button {
          width: 100%;
          font-size: 16px;
          margin: 5px 0
        }

        #apiButton,
        #blogButton {
          display: block
        }
      }
    </style>
  </head>
  <body>
    <div class="fullscreen-div">
      <h1>Welcome!</h1>
      <img src="images/sunny.png" alt="icon">
      <a href="https://blog.sunnytseng.com" id="blogButton" class="button">My Blog</a>
      <a href="https://api.sunnytseng.com" id="apiButton" class="button">My API</a>
    </div>
  </body>
</html>
