<!doctypehtml><html lang=en><meta charset=UTF-8><meta content="width=device-width,initial-scale=1"name=viewport><title>Sunny</title><link href=images/favicon.ico rel=icon><link href=""rel=stylesheet disabled id=dynamicCSS><style>.original-div{display:block}.fullscreen-div{display:none}</style><div class=original-div><span>歡迎來到我的網站</span><hr><ul><li>我的名字叫曾子謙<li>英文名字叫 Sunny<li>下面有自己其他的網站鏈結</ul><hr><a href=https://home.sunnytseng.com target=_blank>My WEB</a><br><a href=https://math.sunnytseng.com target=_blank>Math</a><br><a href=https://Music.sunnytseng.com target=_blank>Music</a><br><a href=https://relation.sunnytseng.com/ target=_blank>Relation</a><br><a href=https://buymeacoffee.com/sunnytseng target=_blank>Donate</a><hr><span>喔對了 如果你覺得畫面很醜可以點選優化</span><br><label for=myCheckbox1>優化</label> <input id=myCheckbox1 name=option type=checkbox></div><div class=fullscreen-div><h1>Welcome!</h1><img alt=icon height=200 src=images/sunny.png width=200> <a href=https://home.sunnytseng.com target=_blank class=button id=blogButton>My WEB</a> <a href=https://math.sunnytseng.com target=_blank class=button id=mathButton>Math</a> <a href=https://music.sunnytseng.com target=_blank class=button id=musicButton>Music</a> <a href=https://relation.sunnytseng.com target=_blank class=button id=relationButton>Relation</a><br><a href=https://buymeacoffee.com/sunnytseng target=_blank class=button2 id=donateButton>Donate</a><br><label for=myCheckbox2 style=cursor:pointer;display:flex;align-items:center;gap:5px><input id=myCheckbox2 name=option type=checkbox onmouseout='this.style.transform="scale(1)",this.style.boxShadow="none"'onmouseover='this.style.transform="scale(1.2)",this.style.boxShadow="0 0 5px rgba(255, 0, 0, 0.5)"'style="width:20px;height:20px;accent-color:red;cursor:pointer;transition:transform .2s ease,box-shadow .2s ease"><h5 style=margin:0>移除優化</h5></label></div><script>var checkboxes = document.querySelectorAll('input[type="checkbox"]');
  function toggleView(isChecked) {
    var cssLink = document.getElementById("dynamicCSS");
    var originalDiv = document.querySelector(".original-div");
    var fullscreenDiv = document.querySelector(".fullscreen-div");

    if (isChecked) {
      cssLink.href = "css/style.css";
      cssLink.removeAttribute("disabled");
      originalDiv.style.display = "none";
      fullscreenDiv.style.display = "block";
    } else {
      cssLink.href = "";
      cssLink.setAttribute("disabled", "true");
      originalDiv.style.display = "block";
      fullscreenDiv.style.display = "none";
    }
    checkboxes.forEach(cb => cb.checked = isChecked);
  }
  checkboxes.forEach(cb => {
    cb.addEventListener("change", function() {
      toggleView(this.checked);
    });
  });</script>
